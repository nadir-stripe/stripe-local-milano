<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ordine Confermato — Olio d'Oro</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f4f7f4;
      color: #1c1917;
    }
    .container {
      text-align: center;
      max-width: 420px;
      padding: 48px 32px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: #1e3a1c;
      margin-bottom: 8px;
    }
    p { color: #78716c; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🫒</div>
    <h1>Grazie per il tuo ordine!</h1>
    <p>Il tuo olio d'oliva premium è in arrivo. Riceverai una conferma via email a breve.</p>
  </div>
</body>
</html>
